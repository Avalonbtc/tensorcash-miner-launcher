services:
  sidecar:
    image: ${MINER_IMAGE:?Set MINER_IMAGE in miner.env}
    restart: unless-stopped
    ipc: host
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      MODEL_NAME: ${MODEL_NAME}
      MODEL_COMMIT: ${MODEL_COMMIT}
      # vLLM loads this local snapshot, while MODEL_NAME remains the
      # chain-registered identifier used in generated proofs.
      VLLM_MODEL_PATH: ${VLLM_MODEL_PATH:-/models/hub/models--Qwen--Qwen3-8B/snapshots/${MODEL_COMMIT}}
      MODEL_DIFFICULTY_NORMALIZER: ${MODEL_DIFFICULTY_NORMALIZER}
      MAX_MODEL_LEN: ${MAX_MODEL_LEN}
      GPU_MEM_UTIL: ${GPU_MEM_UTIL}
      VLLM_TENSOR_PARALLEL_SIZE: ${VLLM_TENSOR_PARALLEL_SIZE}
      VLLM_MAX_NUM_SEQS: ${VLLM_MAX_NUM_SEQS}
      # vLLM can sample running requests and its bounded waiting reserve in
      # one batch. Keep the TensorCash proof row pool at least that large.
      POW_MAX_CONCURRENCY: ${POW_MAX_CONCURRENCY:-}
      # A launcher-computed tiered capture list. vLLM filters it to each
      # bootstrap candidate before starting the engine.
      VLLM_CUDA_GRAPH_SIZES: ${VLLM_CUDA_GRAPH_SIZES:-}
      # Optional high-throughput token scheduler budget for validated 24 GiB
      # TP=1 profiles. Leave empty for smaller TP groups.
      VLLM_MAX_NUM_BATCHED_TOKENS: ${VLLM_MAX_NUM_BATCHED_TOKENS:-}
      TENSORCASH_VLLM_EFFECTIVE_MAX_SEQS_FILE: /data/vllm-effective-max-seqs
      TENSORCASH_VLLM_FALLBACK_MIN_SEQS: ${TENSORCASH_VLLM_FALLBACK_MIN_SEQS:-32}
      TENSORCASH_VLLM_STARTUP_TIMEOUT_SECONDS: ${TENSORCASH_VLLM_STARTUP_TIMEOUT_SECONDS:-900}
      TENSORCASH_VLLM_CLEANUP_TIMEOUT_SECONDS: ${TENSORCASH_VLLM_CLEANUP_TIMEOUT_SECONDS:-120}
      TENSORCASH_VLLM_CLEANUP_MAX_USED_MIB: ${TENSORCASH_VLLM_CLEANUP_MAX_USED_MIB:-512}
      TENSORCASH_VLLM_CLEANUP_GPU_IDS: ${NVIDIA_VISIBLE_DEVICES}
      # TensorCash NOMP is continuous share mining.  A generic post-solution
      # cooldown aborts vLLM completions and leaves otherwise healthy GPUs idle.
      MINING_SOLUTION_COOLDOWN_SEC: "0"
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES}
      CUDA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES}
      NCCL_P2P_DISABLE: ${NCCL_P2P_DISABLE:-1}
      NCCL_IB_DISABLE: ${NCCL_IB_DISABLE:-1}
      NCCL_CUMEM_HOST_ENABLE: ${NCCL_CUMEM_HOST_ENABLE:-0}
      # Keep vLLM and transformers on the launcher-managed, resumable model cache.
      HF_HOME: /models
      HF_HUB_CACHE: /models/hub
      TRANSFORMERS_CACHE: /models/hub
      # `trust_remote_code` initializes a small dynamic-module cache. Keep it
      # outside the read-only shared model store and recreate it per sidecar.
      HF_MODULES_CACHE: /tmp/hf-modules
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      HF_HUB_DISABLE_TELEMETRY: "1"
      # Avoid vLLM's optional usage-reporter thread. Some constrained mining
      # hosts return concatenated CPU metadata, which makes that unrelated
      # telemetry thread log a JSONDecodeError during model startup.
      VLLM_DO_NOT_TRACK: "1"
      NOMP_SIDECAR_ENABLED: "true"
      NOMP_SIDECAR_TOKEN: ${NOMP_SIDECAR_TOKEN}
      # `auto` starts at the launcher-selected profile and lets the local
      # sidecar retain only measured throughput improvements.
      NOMP_SIDECAR_CONCURRENCY: ${NOMP_SIDECAR_CONCURRENCY:-auto}
      NOMP_SIDECAR_ADAPTIVE_START_CONCURRENCY: ${NOMP_SIDECAR_ADAPTIVE_START_CONCURRENCY:-32}
      NOMP_SIDECAR_ADAPTIVE_MAX_CONCURRENCY: ${NOMP_SIDECAR_ADAPTIVE_MAX_CONCURRENCY:-1024}
      NOMP_SIDECAR_ADAPTIVE_STEP: ${NOMP_SIDECAR_ADAPTIVE_STEP:-32}
      # Optional vLLM request reserve. It stays queued until a running slot
      # opens, so it can smooth fixed-length completion cohorts without
      # increasing VLLM_MAX_NUM_SEQS or GPU KV-cache usage.
      NOMP_SIDECAR_PREFETCH_REQUESTS: ${NOMP_SIDECAR_PREFETCH_REQUESTS:-0}
      NOMP_SIDECAR_MIN_BUFFERED_PROOFS: ${NOMP_SIDECAR_MIN_BUFFERED_PROOFS:-16}
      NOMP_SIDECAR_MAX_BUFFERED_PROOFS: ${NOMP_SIDECAR_MAX_BUFFERED_PROOFS:-512}
      WORKER_MODE: standalone
      STANDALONE_MODE: "true"
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: "8080"
      TARGET_URL: http://127.0.0.1:8000
      API_KEY: internal-secret
      TEST_MODE: "false"
      PRIORITY_MODE: "false"
      MIN_ACTIVE_REQUESTS: "0"
      MINING_ENABLED: "true"
      POW_PROOF_VERSION: "3"
      # NOMP consumes proofs through its own bounded sidecar queue. Retaining
      # a second generic completion cache duplicates proof blobs without giving
      # the controller a recovery path, so keep the compatibility cache tiny.
      PROOF_CACHE_ENABLED: "false"
      PROOF_COLLECTOR_PORT: "7002"
      TOOL_CALL_PARSER: ${TOOL_CALL_PARSER:-qwen3_coder}
      USE_VLLM_XARGS: "false"
    volumes:
      - ${MODELS_DATA}:/models
      - ${RUNTIME_DATA}:/data
      - ./vllm-local-cache.sh:/app/start-vllm.sh:ro
      - ./vllm-cdf-sitecustomize.py:/app/vllm-cdf-patch/sitecustomize.py:ro
      - ./start-proxy-overlay.sh:/app/start-proxy.sh:ro
      - ./nomp-claim-route-patch.py:/app/nomp-claim-route-patch.py:ro
      # Mount the audited NOMP scheduler directly so concurrency upgrades do
      # not require every miner to download a rebuilt multi-GB runtime image.
      - ./nomp-sidecar-overlay.py:/app/miner-proxy/src/components/nomp_sidecar.py:ro
      - ./sidecar-status-overlay.py:/app/miner-proxy/src/sitecustomize.py:ro
    healthcheck:
      # /health only means that the proxy process is listening. During the
      # vLLM capacity probe it can briefly be true at 32 sequences while the
      # bootstrap is about to replace that vLLM instance with the next probe.
      # The capacity marker is written only after the final vLLM server is
      # healthy, so miners cannot start against a transient probe instance.
      test: ["CMD-SHELL", "test -s /data/vllm-effective-max-seqs && grep -Eq '^[1-9][0-9]*$' /data/vllm-effective-max-seqs && curl -fsS http://127.0.0.1:8080/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 180
      start_period: 30s

  miner:
    image: ${MINER_IMAGE:?Set MINER_IMAGE in miner.env}
    restart: unless-stopped
    network_mode: service:sidecar
    depends_on:
      sidecar:
        condition: service_healthy
    entrypoint: ["/opt/tensorcash/start-miner.sh"]
    environment:
      POOL_HOST: ${POOL_HOST}
      POOL_PORT: ${POOL_PORT}
      PAYOUT_ACCOUNT: ${PAYOUT_ACCOUNT}
      WORKER: ${WORKER}
      NOMP_SIDECAR_TOKEN: ${NOMP_SIDECAR_TOKEN}
      # Lets the controller report model-difficulty-normalized accepted work.
      # This does not alter the pool target or consensus proof verification.
      MODEL_DIFFICULTY_NORMALIZER: ${MODEL_DIFFICULTY_NORMALIZER:-1000000}
      TENSORCASH_POLL_MS: ${TENSORCASH_POLL_MS:-200}
      TENSORCASH_SUBMIT_WINDOW: ${TENSORCASH_SUBMIT_WINDOW:-16}
      TENSORCASH_STATS_INTERVAL: ${TENSORCASH_STATS_INTERVAL:-30}
      TENSORCASH_SIDECAR_WAIT_SECONDS: ${TENSORCASH_SIDECAR_WAIT_SECONDS:-1200}
    volumes:
      - ${MINER_BINARY_PATH:-./runtime/bin/niuquanminer}:/opt/tensorcash/niuquanminer:ro
      - ./start-miner-overlay.sh:/opt/tensorcash/start-miner.sh:ro
