name: Publish TensorCash Blackwell runtime

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - blackwell/**
      - .github/workflows/publish-blackwell-image.yml

permissions:
  contents: read
  packages: write

env:
  TENSORCASH_REF: 2df1b0192b8323b1e92699de5f7c0c09c9c5e02a
  VLLM_V019_REF: a52102827e98fec2f68b2fe7d3d20f08f47452f2
  # vLLM needs a CUDA source build against the CUDA-13 PyTorch ABI. One job
  # exceeded GitHub's six-hour ceiling; two jobs fit runner memory while
  # BuildKit still serializes independent heavyweight stages below.
  VLLM_BUILD_JOBS: 2
  # OCI repository names are strictly lowercase; GitHub preserves the owner's
  # display casing in github.repository_owner, which Buildx rejects as a tag.
  IMAGE: ghcr.io/avalonbtc/tensorcash-miner

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Fetch pinned TensorCash source and Blackwell vLLM source
        run: |
          # A full TensorCash clone is unnecessarily large for this image and
          # can fail before BuildKit even starts. Fetch the immutable source
          # tree as an archive, then fetch only the one vLLM gitlink needed
          # by the Blackwell Dockerfile.
          mkdir -p tensorcash
          curl --fail --location --retry 5 --retry-all-errors \
            "https://github.com/tensorcash/tensorcash/archive/${TENSORCASH_REF}.tar.gz" \
            | tar -xz --strip-components=1 -C tensorcash
          mkdir -p tensorcash/services/miner-api/vllm-v019
          git -C tensorcash/services/miner-api/vllm-v019 init
          git -C tensorcash/services/miner-api/vllm-v019 remote add origin https://github.com/tensorcash/vllm.git
          git -C tensorcash/services/miner-api/vllm-v019 fetch --depth=1 origin "$VLLM_V019_REF"
          git -C tensorcash/services/miner-api/vllm-v019 checkout --detach FETCH_HEAD
          python3 blackwell/generate_dockerfile.py \
            --upstream tensorcash/services/miner-api/vllm_blackwell_v019.Dockerfile \
            --output tensorcash/deployments/simple-worker/Dockerfile.blackwell-v019
          grep -F 'FROM blackwell-runtime AS tensorcash-miner-blackwell' \
            tensorcash/deployments/simple-worker/Dockerfile.blackwell-v019

      - name: Inspect hosted-runner capacity
        run: |
          free -h
          df -h
          docker system df || true

      - uses: docker/setup-buildx-action@v3
        with:
          # The upstream recipe has three independent native build stages.
          # Serialise them so their peak RAM does not overlap on a standard
          # GitHub-hosted runner.
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 1

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./tensorcash
          file: ./tensorcash/deployments/simple-worker/Dockerfile.blackwell-v019
          build-contexts: |
            vllm_src=./tensorcash/services/miner-api/vllm-v019
          build-args: |
            VLLM_BUILD_JOBS=${{ env.VLLM_BUILD_JOBS }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:mainnet-0.1.1-blackwell
            ${{ env.IMAGE }}:mainnet-blackwell-latest
          cache-from: type=gha
          # `mode=max` tries to export the complete CUDA build graph, which
          # can be larger than a hosted runner's practical cache budget.
          cache-to: type=gha,mode=min
